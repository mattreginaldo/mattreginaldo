name: Update WakaTime card

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Generate WakaTime card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: wakatime
          options: username=mattreginaldo&layout=compact&theme=transparent
          path: profile/wakatime.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated card
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/wakatime.svg
          git commit -m "chore: update WakaTime stats" || exit 0
          git push
